<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nébula Music - Registro</title>
    <link rel="stylesheet" href="./styles/styles.css">
</head>
<body>

    <main class="auth-container">
        <section class="auth-card">
            
            <!-- TAREA PARA EL ALUMNO:
                 Crea un formulario que envíe los datos mediante POST a "/crear-cuenta".
                 Debe contener campos para:
                 - Nombre completo (texto)
                 - Correo electrónico (email)
                 - Contraseña (password)
                 - Pseudónimo (texto con patrón de validación: [letras de 3 a 10]-[números de 2 a 10])
                 - Género (radio buttons: Femenino, Masculino, Otro)
                 - Tipo de Suscripción (select: Gratis, Premium Mensual, Premium Anual)
                 - Fecha de nacimiento (date)
                 - Aceptar términos y condiciones (checkbox)
                 - Comentarios adicionales o gustos (textarea)
            -->
            <form class="auth-form" method="post" action="/crear-cuenta" enctype="application/x-www-form-urlencoded">
                <!-- Escribe tus etiquetas (label) e inputs aquí -->
                <h2>Crear Cuenta</h2>
                <div>
                    <label for="nombre" >Nombre completo:</label>
                    <input
                            type="text"
                            id="nombre"
                            name="nombre"
                            placeholder="ej. Juanito Pérez"
                            required
                            minlength="10"
                            maxlength="250">
                </div>
                <div>
                    <label for="correo">Correo electrónico:</label>
                    <input
                            type="email"
                            id="correo"
                            name="correo"
                            placeholder="juanito@gmail.com"
                            required>
                </div>
                <div>
                    <label for="contrasenia">Contraseña:</label>
                    <input
                            type="password"
                            id="contrasenia"
                            name="contrasenia"
                            placeholder="Mínimo 8 caracteres"
                            required
                            minlength="8">
                </div>
                <div>
                    <label for="txt_pseudonimo">Pseudónimo:</label>
                    <input
                            type="text"
                            id="txt_pseudonimo"
                            name="txt_pseudonimo"
                            required
                            pattern="[a-zA-Z]{3,10}-[0-9]{2,10}"
                            placeholder="nebula-2025">
                </div>

                <div>
                    <label>Género:</label>
                    <div>
                        <input
                                type="radio"
                                id="rad_femenino"
                                name="rad_genero"
                                value="femenino"
                                required>
                        <label for="rad_femenino">Femenino</label>
                        <input
                                type="radio"
                                id="rad_masculino"
                                name="rad_genero"
                                value="masculino"
                                >
                        <label for="rad_masculino">Masculino</label>
                        <input
                                type="radio"
                                id="rad_otro"
                                name="rad_genero"
                                value="otro"
                        >
                        <label for="rad_otro">Otro / Prefiero no decirlo</label>
                    </div>
                </div>

                <div>
                    <label for="sel_subscripcion">Tipo de subsripción:</label>
                    <select id="sel_subscripcion" name="sel_subscripcion" required>
                        <option value="">--Selecciona una opción</option>
                        <option value="gratis">Gratis</option>
                        <option value="premium_mensual">Premium mensual ($99.9/mes) </option>
                        <option value="premium_anual">Premium mensual ($899/año) </option>
                    </select>
                </div>

                <div>
                    <label for="fecha_nacimiento">Fecha nacimiento:</label>
                    <input
                            type="date"
                            id="fecha_nacimiento"
                            name="fecha_nacimiento"
                            required>
                </div>

                <div>
                    <label for="comentarios">Comentarios:</label>
                    <textarea id="comentarios" name="comentarios" rows="4" cols="40" placeholder="Cuéntanos que música te gusta!"></textarea>
                </div>

                <div>
                    <input
                            type="checkbox"
                            id="terminos"
                            name="chk_terminos"
                            value="aceptado"
                            required>
                    <label>Acepto los términos y condiciones</label>
                </div>
                <div>
                    <button type="submit">Crear cuenta</button>
                    <button type="reset">Limpiar Formulario</button>
                </div>
            </form>
        <p>¿Ya tienes una cuenta? </p> <a href="iniciar-sesion.html"> Inicia sesión</a>
        </section>
    </main>

    <footer>
        <p>Copyright Nébula 2025.</p>
    </footer>

</body>
</html>
